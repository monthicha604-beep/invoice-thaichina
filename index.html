<!DOCTYPE html>
<html lang="th">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>ใบกำกับภาษี</title>

<style>
  @media print {
  body {
    background: white;
  }
    @media print {
  body {
    font-family: 'Sarabun', sans-serif;
  }

  * {
    font-family: 'Sarabun', sans-serif !important;
  }
}

  .container {
    width: 210mm;
    min-height: 297mm;
    padding: 20mm;
    margin: auto;
    box-shadow: none;
    border-radius: 0;
  }
}
body {
  font-family: 'Sarabun', sans-serif;
}
.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
h1 {
  text-align: center;
  letter-spacing: 2px;
}
input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border: 1px solid #ddd;
}
button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
}
table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}
th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}
.footer {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  text-align: center;
}
.line {
  border-bottom: 1px solid black;
  margin-top: 30px;
}
</style>

</head>

<body>

<div class="container">

<div style="text-align:center;">
  <img src="logo.png" style="width:120px;"><br><br>

  <b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
  THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
  3178 ซอยเอกชัย 109 แขวงบางบอนใต้ เขตบางบอน กรุงเทพมหานคร 10150<br>
  เลขประจำตัวผู้เสียภาษี: 0103566005842<br><br>

  <h1>ใบกำกับภาษี / INVOICE</h1>
</div>
  <p id="invoiceNo" style="text-align:right; font-weight:bold;"></p>
  
<input id="customer" placeholder="ชื่อลูกค้า">
<input id="taxId" placeholder="เลขผู้เสียภาษี">
<input id="address" placeholder="ที่อยู่จัดส่ง">

<h3>รายการสินค้า</h3>

<input id="name" placeholder="สินค้า">
<input id="price" type="number" placeholder="ราคา">
<input id="qty" type="number" placeholder="จำนวน">

<button onclick="addItem()">เพิ่มรายการ</button>

<table>
<thead>
<tr>
<th>สินค้า</th>
<th>ราคา</th>
<th>จำนวน</th>
<th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>

<div class="footer">
  <div>
    ผู้อนุมัติ
    <div class="line"></div>
  </div>
  <div>
    ผู้รับเงิน
    <div class="line"></div>
  </div>
  <div>
    ผู้รับสินค้า
    <div class="line"></div>
  </div>
  <div>
    วันที่รับ
    <div class="line"></div>
  </div>
</div>

<br>
<button onclick="window.print()">📄 ดาวน์โหลด PDF</button>

</div>

<script>
  let count = localStorage.getItem("invoiceCount") || 0;
count++;
localStorage.setItem("invoiceCount", count);

let invoiceNumber = "INV-" + String(count).padStart(4, '0');
document.getElementById("invoiceNo").innerText = "เลขที่บิล: " + invoiceNumber;
let items = [];
function downloadPDF() {
const element = document.querySelector(".container");

  let opt = {
    margin: 0,
    filename: 'invoice.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 3, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
}

function addItem() {
  
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  let total = price * qty;

  items.push({name, price, qty, total});
  render();
}

function render() {
  let html = "";
  let total = 0;

  items.forEach(i => {
    html += `<tr>
      <td>${i.name}</td>
      <td>${i.price}</td>
      <td>${i.qty}</td>
      <td>${i.total}</td>
    </tr>`;
    total += i.total;
  });

  document.getElementById("table").innerHTML = html;

  let vat = total * 0.07;
  let grand = total + vat;

  document.getElementById("summary").innerHTML =
    `รวม: ${total.toFixed(2)} | VAT 7%: ${vat.toFixed(2)} | สุทธิ: ${grand.toFixed(2)}`;
}

function printBill() {
  window.print();
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
