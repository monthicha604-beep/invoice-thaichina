<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China Invoice System</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Sarabun';background:#eef2f7;margin:0}

/* NAV */
.nav{
  background:#0f172a;
  color:#fff;
  padding:14px;
  display:flex;
  gap:12px;
}
.nav button{
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
}

/* CONTAINER A4 */
.container{
  width:210mm;
  min-height:297mm;
  margin:20px auto;
  background:#fff;
  padding:20mm;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.left,.right{width:48%}
.right{text-align:right}

/* INPUT */
input,select{
  width:100%;
  padding:8px;
  margin:4px 0;
  border:1px solid #ddd;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
th{background:#f1f5f9}

/* FOOTER */
.footer{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  margin-top:40px;
  text-align:center;
}
.line{border-bottom:1px solid #000;margin-top:30px}

/* PRINT A4 FIX */
@media print{
  body{background:#fff}
  .nav,button,input,select{display:none}
  .container{
    width:210mm;
    height:297mm;
    padding:15mm;
    box-shadow:none;
  }
}

/* BUTTON */
button{
  background:#0f172a;
  color:#fff;
  padding:8px;
  border:none;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
</div>

<!-- BILL -->
<div id="billPage" class="container">

<div style="text-align:center">
<img src="logo.png" style="width:90px"><br><br>
<b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
3178 ซอยเอกชัย 109 แขวงบางบอนใต้ เขตบางบอน กรุงเทพมหานคร<br>
เลขผู้เสียภาษี: 0103566005842
<h2 id="docType">ใบกำกับภาษี</h2>
</div>

<select onchange="changeDocType(this.value)">
<option value="invoice">ใบกำกับภาษี</option>
<option value="quote">ใบเสนอราคา</option>
<option value="receipt">ใบเสร็จ</option>
</select>

<div class="header">
<div class="left">
<input id="customer" placeholder="ลูกค้า">
<input id="address" placeholder="ที่อยู่">
</div>

<div class="right">
<p id="invoiceNo"></p>
<input type="date" id="date">
</div>
</div>

<h3>รายการสินค้า</h3>

<input id="name" placeholder="สินค้า">
<input id="qty" type="number" placeholder="จำนวน">
<input id="price" type="number" placeholder="ราคา">
<input id="discount" type="number" placeholder="ส่วนลด">

<button onclick="addItem()">เพิ่มสินค้า</button>

<table>
<thead>
<tr>
<th>#</th><th>สินค้า</th><th>จำนวน</th><th>ราคา</th><th>ส่วนลด</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>
<h4 id="thaiText"></h4>

<div class="footer">
<div>ผู้อนุมัติ<div class="line"></div></div>
<div>ผู้รับเงิน<div class="line"></div></div>
<div>ผู้รับสินค้า<div class="line"></div></div>
<div>วันที่รับ<div class="line"></div></div>
</div>

<button onclick="INSERT()">💾 บันทึก</button>
<button onclick="window.print()">📄 PDF</button>

</div>

<!-- HISTORY -->
<div id="historyPage" class="container" style="display:none">

<input id="search" placeholder="ค้นหา">
<button onclick="SELECT()">ค้นหา</button>

<table>
<thead>
<tr><th>เลขบิล</th><th>ลูกค้า</th><th>วันที่</th><th>ยอด</th><th>สถานะ</th></tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none">
<canvas id="monthChart"></canvas>
<canvas id="yearChart"></canvas>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzP8MW4qH9lkdS56vj-6c_4jI6R0yWNYNolRWkH_NVvCTNHLnu9wlrpuvksN9MCeJng/exec";

let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let items=[];

/* GENERATE ID */
function generateID(){
let c=localStorage.getItem("invoiceCount")||0;
c++;
localStorage.setItem("invoiceCount",c);
return "INV-"+String(c).padStart(4,'0');
}

let invoiceNumber=generateID();
invoiceNo.innerText=invoiceNumber;

/* ADD ITEM */
function addItem(){
let total=(qty.value*price.value)-discount.value;
items.push({name:name.value,qty:+qty.value,price:+price.value,discount:+discount.value,total});
render();
}

function render(){
let html="",subtotal=0;

items.forEach((i,x)=>{
html+=`<tr><td>${x+1}</td><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td><td>${i.discount}</td><td>${i.total}</td></tr>`;
subtotal+=i.total;
});

table.innerHTML=html;

let vat=subtotal*0.07;
let total=subtotal+vat;

summary.innerText=`Subtotal ${subtotal} | VAT ${vat.toFixed(2)} | Total ${total.toFixed(2)}`;
thaiText.innerText=total.toLocaleString("th-TH")+" บาทถ้วน";
}

/* INSERT */
function INSERT(){

let subtotal=items.reduce((s,i)=>s+i.total,0);
let vat=subtotal*0.07;
let total=subtotal+vat;

let bill={
id:invoiceNumber,
customer:customer.value,
date:date.value,
total,
status:"active"
};

bills.push(bill);
localStorage.setItem("bills",JSON.stringify(bills));

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(bill)
});

alert("บันทึกแล้ว");
}

/* SELECT */
function SELECT(){
let k=search.value.toLowerCase();
let f=bills.filter(b=>b.id.toLowerCase().includes(k)||b.customer.toLowerCase().includes(k));

let html="";
f.forEach(b=>{
html+=`<tr><td>${b.id}</td><td>${b.customer}</td><td>${b.date}</td><td>${b.total}</td><td>${b.status}</td></tr>`;
});
historyTable.innerHTML=html;
}
SELECT();

/* DASHBOARD */
let m={},y={};
bills.forEach(b=>{
let mo=b.date?.slice(0,7);
let ye=b.date?.slice(0,4);

m[mo]=(m[mo]||0)+b.total;
y[ye]=(y[ye]||0)+b.total;
});

new Chart(monthChart,{
type:"bar",
data:{labels:Object.keys(m),datasets:[{label:"รายเดือน",data:Object.values(m)}]}
});

new Chart(yearChart,{
type:"line",
data:{labels:Object.keys(y),datasets:[{label:"รายปี",data:Object.values(y)}]}
});

function showPage(p){
billPage.style.display=p==="bill"?"block":"none";
historyPage.style.display=p==="history"?"block":"none";
dashboardPage.style.display=p==="dashboard"?"block":"none";
}

function changeDocType(v){
docType.innerText=
v==="invoice"?"ใบกำกับภาษี":
v==="quote"?"ใบเสนอราคา":"ใบเสร็จ";
}

</script>

</body>
</html>
