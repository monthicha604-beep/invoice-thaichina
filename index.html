<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>THAI CHINA FABRIC ERP PRO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', Arial; margin: 0; background:#eef1f7; }
    .menu { background:#1f2a44; color:white; padding:15px; display:flex; gap:15px; flex-wrap:wrap; }
    .menu button { background:none; border:none; color:white; font-size:14px; cursor:pointer; }
    .container { padding:20px; }
    .box { background:white; padding:25px; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.08); }
    .header { display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #1f2a44; padding-bottom:10px; }
    table { width:100%; border-collapse: collapse; margin-top:15px; }
    table, th, td { border:1px solid #ccc; }
    th { background:#1f2a44; color:white; }
    th, td { padding:8px; text-align:center; }
    input, select { width:100%; padding:5px; margin:3px 0; border:1px solid #ddd; border-radius:4px; }
    .right { text-align:right; margin-top:10px; }
    .btn { padding:8px 14px; margin-top:10px; cursor:pointer; border:none; border-radius:6px; background:#1f2a44; color:white; }
    .logo { width:120px; }
    .title { text-align:center; font-size:22px; font-weight:bold; margin-top:10px; }
  </style>
</head>
<body>

<div class="menu">
  <button onclick="openDoc('invoice')">ใบแจ้งหนี้</button>
  <button onclick="openDoc('receipt')">ใบเสร็จ</button>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('report')">รายงาน</button>
  <button onclick="showPage('users')">ผู้ใช้</button>
</div>

<div class="container">
  <div id="documentPage" class="box">
    <div id="docArea">
      <div class="header">
        <div>
          <b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
          เลขผู้เสียภาษี 0103566005842
        </div>
        <div>
          <img src="logo.png" class="logo"><br>
          <img src="signature.png" style="width:120px;">
        </div>
      </div>

      <div class="title" id="docTitle"></div>
      เลขที่เอกสาร: <b id="docNo"></b>

      <h3>ข้อมูลลูกค้า</h3>
      <input type="text" id="customerName" placeholder="ชื่อลูกค้า">
      <input type="date" id="date">

      <table id="itemTable">
        <thead>
          <tr>
            <th>ลำดับ</th>
            <th>รายการ</th>
            <th>จำนวน</th>
            <th>ราคา</th>
            <th>รวม</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <button class="btn" onclick="addRow()">+ เพิ่มรายการ</button>

      <div class="right">
        วิธีชำระเงิน:
        <select id="payment">
          <option>เงินสด</option>
          <option>โอน</option>
          <option>CREDIT</option>
        </select>
        <br>
        รวม: <span id="grandTotal">0</span>
      </div>
    </div>

    <button class="btn" onclick="saveDoc()">บันทึก</button>
    <button class="btn" onclick="generatePDF()">PDF</button>
  </div>

  <div id="dashboard" class="box" style="display:none">
    <h2>Dashboard ยอดขาย</h2>
    <canvas id="salesChart"></canvas>
  </div>

  <div id="report" class="box" style="display:none">
    <h2>รายงาน</h2>
    <table>
      <thead><tr><th>เลขที่</th><th>ลูกค้า</th><th>ยอด</th><th>ชำระ</th></tr></thead>
      <tbody id="reportTable"></tbody>
    </table>
  </div>

  <div id="users" class="box" style="display:none">
    <h2>ผู้ใช้</h2>
    <input type="text" id="newUser" placeholder="Username">
    <input type="password" id="newPass" placeholder="Password">
    <button class="btn" onclick="addUser()">เพิ่มผู้ใช้</button>
    <ul id="userList"></ul>
  </div>
</div>

<script>
let counter = JSON.parse(localStorage.getItem("docCounter") || "{}");
let currentType = "invoice";

function formatDocNo(type){
  let year = new Date().getFullYear();
  if(!counter[type]) counter[type]=1;
  return type.toUpperCase()+"-"+year+"-"+String(counter[type]).padStart(3,'0');
}

function openDoc(type) {
  showPage('documentPage');
  currentType = type;
  document.getElementById("docNo").innerText = formatDocNo(type);
  document.getElementById("docTitle").innerText = type=='invoice'?'ใบแจ้งหนี้':'ใบเสร็จรับเงิน';
}

function showPage(page) {
  document.getElementById('documentPage').style.display='none';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('report').style.display='none';
  document.getElementById('users').style.display='none';
  document.getElementById(page).style.display='block';
  loadReport();
  loadChart();
  loadUsers();
}

function addRow() {
  let table = document.querySelector("#itemTable tbody");
  let rowCount = table.rows.length + 1;
  let row = table.insertRow();
  row.innerHTML = `
    <td>${rowCount}</td>
    <td><input type="text"></td>
    <td><input type="number" class="qty" oninput="calculate()"></td>
    <td><input type="number" class="price" oninput="calculate()"></td>
    <td class="total">0</td>
  `;
}
addRow();

function calculate() {
  let qty = document.querySelectorAll(".qty");
  let price = document.querySelectorAll(".price");
  let total = document.querySelectorAll(".total");
  let sumTotal = 0;

  for (let i = 0; i < qty.length; i++) {
    let sum = (qty[i].value || 0) * (price[i].value || 0);
    total[i].innerText = sum.toFixed(2);
    sumTotal += sum;
  }
  document.getElementById("grandTotal").innerText = sumTotal.toFixed(2);
}

function saveDoc() {
  let docNo = document.getElementById("docNo").innerText;
  let customer = document.getElementById("customerName").value;
  let total = document.getElementById("grandTotal").innerText;
  let payment = document.getElementById("payment").value;

  let data = JSON.parse(localStorage.getItem("documents") || "[]");
  data.push({docNo, customer, total, payment});
  localStorage.setItem("documents", JSON.stringify(data));

  counter[currentType]++;
  localStorage.setItem("docCounter", JSON.stringify(counter));

  if(currentType=='invoice' && payment!='CREDIT'){
    alert('สร้างใบเสร็จอัตโนมัติ');
  }
}

function loadReport() {
  let data = JSON.parse(localStorage.getItem("documents") || "[]");
  let table = document.getElementById("reportTable");
  table.innerHTML = "";
  data.forEach(d => {
    let row = table.insertRow();
    row.innerHTML = `<td>${d.docNo}</td><td>${d.customer}</td><td>${d.total}</td><td>${d.payment}</td>`;
  });
}

function loadChart(){
  let data = JSON.parse(localStorage.getItem("documents") || "[]");
  let totals = {};
  data.forEach(d=>{
    let month = new Date().getMonth()+1;
    if(!totals[month]) totals[month]=0;
    totals[month]+=Number(d.total);
  });

  new Chart(document.getElementById('salesChart'),{
    type:'bar',
    data:{
      labels:Object.keys(totals),
      datasets:[{label:'ยอดขาย',data:Object.values(totals)}]
    }
  });
}

function addUser(){
  let u = document.getElementById('newUser').value;
  let p = document.getElementById('newPass').value;
  let users = JSON.parse(localStorage.getItem('users')||'[]');
  users.push({u,p});
  localStorage.setItem('users',JSON.stringify(users));
  loadUsers();
}

function loadUsers(){
  let users = JSON.parse(localStorage.getItem('users')||'[]');
  let list = document.getElementById('userList');
  list.innerHTML='';
  users.forEach(x=>{
    let li=document.createElement('li');
    li.innerText=x.u;
    list.appendChild(li);
  });
}

async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');
  const content = document.getElementById("docArea");

  await doc.html(content, {
    callback: function (doc) {
      doc.save("document_A4.pdf");
    },
    x: 10,
    y: 10,
    width: 190
  });
}
</script>

</body>
</html>
