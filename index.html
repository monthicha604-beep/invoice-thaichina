<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Sarabun', sans-serif;
  background: #f4f4f4;
  margin: 0;
}

.nav {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  gap: 20px;
}

.nav button {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  background: white;
  padding: 30px;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button.main {
  background: black;
  color: white;
  padding: 10px;
  border: none;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
}

.footer {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  margin-top: 40px;
  text-align: center;
}

.line {
  border-bottom: 1px solid black;
  margin-top: 30px;
}

@media print {
  button, .nav { display:none; }
}
</style>

</head>

<body>

<div class="nav">
  <button onclick="showPage('bill')">ออกบิล</button>
  <button onclick="showPage('history')">ประวัติบิล</button>
</div>

<!-- PAGE BILL -->
<div id="billPage" class="container">

<div style="text-align:center;">
  <img src="logo.png" style="width:100px;"><br><br>

  <b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
  THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
  <h2 id="billTypeText">ใบกำกับภาษี</h2>
</div>

<p id="invoiceNo" style="text-align:right;"></p>

<label>ประเภทบิล</label>
<select id="billType" onchange="changeType()">
  <option value="tax">ใบกำกับภาษี</option>
  <option value="normal">บิลธรรมดา</option>
</select>

<label>วันที่</label>
<input type="date" id="date">

<label>ลูกค้า</label>
<input id="customer">

<label>เลขผู้เสียภาษี</label>
<input id="taxId">

<label>ที่อยู่</label>
<input id="address">

<h3>สินค้า</h3>

<input id="name" placeholder="สินค้า">
<input id="price" type="number" placeholder="ราคา">
<input id="qty" type="number" placeholder="จำนวน">

<button class="main" onclick="addItem()">เพิ่ม</button>

<table>
<thead>
<tr>
<th>สินค้า</th><th>ราคา</th><th>จำนวน</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>

<div class="footer">
  <div>ผู้อนุมัติ<div class="line"></div></div>
  <div>ผู้รับเงิน<div class="line"></div></div>
  <div>ผู้รับสินค้า<div class="line"></div></div>
  <div>วันที่รับ<div class="line"></div></div>
</div>

<button class="main" onclick="saveBill()">💾 บันทึกบิล</button>
<button class="main" onclick="window.print()">📄 PDF</button>

</div>

<!-- PAGE HISTORY -->
<div id="historyPage" class="container" style="display:none;">

<h2>ประวัติบิล</h2>

<table>
<thead>
<tr>
<th>เลขบิล</th>
<th>ลูกค้า</th>
<th>วันที่</th>
<th>สถานะ</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>

</table>

</div>

<script>

let items = [];
let bills = JSON.parse(localStorage.getItem("bills") || "[]");

// ===== เลขบิล =====
let count = localStorage.getItem("invoiceCount") || 0;
count++;
localStorage.setItem("invoiceCount", count);
let invoiceNumber = "INV-" + String(count).padStart(4, '0');
document.getElementById("invoiceNo").innerText = "เลขที่: " + invoiceNumber;

// ===== เปลี่ยนหน้า =====
function showPage(page) {
  document.getElementById("billPage").style.display = page==="bill"?"block":"none";
  document.getElementById("historyPage").style.display = page==="history"?"block":"none";
  renderHistory();
}

// ===== เปลี่ยนประเภทบิล =====
function changeType(){
  let val = document.getElementById("billType").value;
  document.getElementById("billTypeText").innerText =
    val==="tax" ? "ใบกำกับภาษี" : "บิลธรรมดา";
}

// ===== เพิ่มสินค้า =====
function addItem(){
  let name = document.getElementById("name").value;
  let price = +document.getElementById("price").value;
  let qty = +document.getElementById("qty").value;

  let total = price*qty;
  items.push({name,price,qty,total});
  render();
}

// ===== แสดงสินค้า =====
function render(){
  let html="", total=0;

  items.forEach(i=>{
    html+=`<tr>
      <td>${i.name}</td>
      <td>${i.price}</td>
      <td>${i.qty}</td>
      <td>${i.total}</td>
    </tr>`;
    total+=i.total;
  });

  document.getElementById("table").innerHTML=html;

  let vat = total*0.07;
  let grand = total+vat;

  document.getElementById("summary").innerText =
    `รวม ${total} | VAT ${vat.toFixed(2)} | สุทธิ ${grand.toFixed(2)}`;
}

// ===== บันทึกบิล =====
function saveBill(){
  let bill = {
    invoice: invoiceNumber,
    customer: document.getElementById("customer").value,
    date: document.getElementById("date").value,
    status: "ใช้งาน"
  };

  bills.push(bill);
  localStorage.setItem("bills", JSON.stringify(bills));
  alert("บันทึกแล้ว");
}

// ===== แสดงประวัติ =====
function renderHistory(){
  let html="";
  bills.forEach((b,i)=>{
    html+=`<tr>
      <td>${b.invoice}</td>
      <td>${b.customer}</td>
      <td>${b.date}</td>
      <td>${b.status}</td>
      <td>
        <button onclick="cancelBill(${i})">ยกเลิก</button>
      </td>
    </tr>`;
  });

  document.getElementById("historyTable").innerHTML=html;
}

// ===== ยกเลิกบิล =====
function cancelBill(i){
  bills[i].status="ยกเลิก";
  localStorage.setItem("bills", JSON.stringify(bills));
  renderHistory();
}

</script>

</body>
</html>
