<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China ERP Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Sarabun';background:#eef2f7;margin:0}

.nav{background:#111;color:#fff;padding:12px;display:flex;gap:10px}
.nav button{background:none;border:none;color:#fff;cursor:pointer}

.container{
width:210mm;
min-height:297mm;
margin:20px auto;
background:#fff;
padding:18mm;
border:2px solid #d4af37;
}

.header{display:flex;justify-content:space-between;margin-top:15px}
.box{border:1px solid #ddd;padding:10px;border-radius:6px;width:48%}

table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#f8f8f8}

.summary{width:260px;margin-left:auto;margin-top:10px;border:1px solid #ddd;padding:10px}
.summary p{display:flex;justify-content:space-between}
.total{font-weight:bold;border-top:1px solid #000}

.modal{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;align-items:center;
}
.modal-box{background:#fff;padding:20px;border-radius:10px}

@media print{
.nav,button,input,select{display:none}
.container{width:210mm;height:297mm}
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
</div>

<!-- BILL -->
<div id="billPage" class="container">

<h2 id="docType">ใบกำกับภาษี</h2>

<select onchange="changeType(this.value)">
<option value="INV">INV</option>
<option value="RC">RC</option>
<option value="PO">PO</option>
</select>

<div class="header">
<div class="box">
<input id="customer" placeholder="ลูกค้า">
</div>

<div class="box">
เลขที่: <span id="invoiceNo"></span><br>
วันที่: <input type="date" id="date"><br>

<button onclick="prevBill()">◀️ ก่อนหน้า</button>
<button onclick="nextBill()">ถัดไป ▶️</button>

</div>
</div>

<input id="price" placeholder="ราคา">
<button onclick="addItem()">เพิ่ม</button>

<table>
<thead><tr><th>#</th><th>ราคา</th></tr></thead>
<tbody id="table"></tbody>
</table>

<div class="summary">
<p><span>Subtotal</span><span id="subtotal"></span></p>
<p id="vatRow"><span>VAT</span><span id="vat"></span></p>
<p class="total"><span>Total</span><span id="total"></span></p>
</div>

<button onclick="openPayment()">บันทึก</button>

</div>

<!-- PAYMENT -->
<div id="paymentModal" class="modal">
<div class="modal-box">
<button onclick="cash()">เงินสด</button>
<button onclick="credit()">CREDIT</button>
</div>
</div>

<!-- HISTORY -->
<div id="historyPage" class="container" style="display:none">
<table>
<tbody id="historyTable"></tbody>
</table>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none">
<canvas id="chart"></canvas>
</div>

<script>

let items=[];
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let currentIndex=-1;
let prefix="INV";

/* ID */
function generateID(){
let c=localStorage.getItem(prefix)||0;
c++;
localStorage.setItem(prefix,c);
return prefix+"-"+String(c).padStart(4,'0');
}

/* TYPE */
function changeType(v){
prefix=v;
invoiceNo.innerText=generateID();
render();
}

/* ITEM */
function addItem(){
items.push(Number(price.value));
render();
}

function render(){
let html="",sum=0;
items.forEach((i,x)=>{
html+=`<tr><td>${x+1}</td><td>${i}</td></tr>`;
sum+=i;
});
table.innerHTML=html;

let vatVal = prefix==="INV"?sum*0.07:0;
subtotal.innerText=sum;

if(prefix==="INV"){
vatRow.style.display="block";
vat.innerText=vatVal.toFixed(2);
}else{
vatRow.style.display="none";
}

total.innerText=(sum+vatVal).toFixed(2);
}

/* PAYMENT */
function openPayment(){
paymentModal.style.display="flex";
}

function cash(){
saveBill("เงินสด");
}

function credit(){
saveBill("CREDIT");
}

function saveBill(method){

let sum=items.reduce((a,b)=>a+b,0);
let vatVal = prefix==="INV"?sum*0.07:0;

let bill={
id:invoiceNo.innerText,
customer:customer.value,
total:sum+vatVal
};

bills.push(bill);
currentIndex=bills.length-1;

localStorage.setItem("bills",JSON.stringify(bills));

alert("บันทึกแล้ว");
paymentModal.style.display="none";
}

/* NAVIGATION */
function prevBill(){
if(currentIndex>0){
currentIndex--;
loadBill();
}
}

function nextBill(){
items=[];
customer.value="";
invoiceNo.innerText=generateID();
render();
}

/* LOAD */
function loadBill(){
let b=bills[currentIndex];
customer.value=b.customer;
invoiceNo.innerText=b.id;
}

/* PAGE */
function showPage(p){
billPage.style.display="none";
historyPage.style.display="none";
dashboardPage.style.display="none";

if(p==="bill") billPage.style.display="block";
}

invoiceNo.innerText=generateID();

</script>

</body>
</html>
