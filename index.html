<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Invoice Pro Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:'Sarabun';
  background:#eef1f5;
  margin:0;
}

/* NAV */
.nav{
  background:#111;
  color:#fff;
  padding:14px;
  display:flex;
  gap:15px;
}
.nav button{
  background:none;
  border:none;
  color:#fff;
  cursor:pointer;
  font-size:14px;
}

/* CONTAINER */
.container{
  width:210mm;
  min-height:297mm;
  margin:20px auto;
  background:#fff;
  padding:20mm;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.left,.right{width:48%}
.right{text-align:right}

/* INPUT */
input,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:1px solid #ddd;
  border-radius:4px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
}
th{background:#f7f7f7}

/* BUTTON */
button{
  background:#111;
  color:#fff;
  padding:8px;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  margin-top:40px;
  text-align:center;
}
.line{
  border-bottom:1px solid #000;
  margin-top:30px;
}

/* CALCULATOR */
.calc{
  max-width:300px;
  margin:auto;
}
.calc input{
  text-align:right;
  font-size:20px;
}
.calc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
}
.calc-grid button{
  padding:15px;
  font-size:16px;
}

/* PRINT */
@media print{
  body{background:#fff}
  .nav,button,input,select{display:none}
  .container{
    box-shadow:none;
    width:210mm;
    height:297mm;
  }
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('calc')">เครื่องคิดเลข</button>
</div>

<!-- BILL -->
<div id="billPage" class="container">

<div style="text-align:center">
<img src="logo.png" style="width:90px"><br><br>
<b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
3178 ซอยเอกชัย 109 แขวงบางบอนใต้ เขตบางบอน กรุงเทพมหานคร<br>
เลขผู้เสียภาษี: 0103566005842
<h2 id="docType">ใบกำกับภาษี</h2>
</div>

<select onchange="changeDocType(this.value)">
<option value="invoice">ใบกำกับภาษี</option>
<option value="quote">ใบเสนอราคา</option>
<option value="receipt">ใบเสร็จ</option>
</select>

<div class="header">
<div class="left">
<input id="customer" placeholder="ลูกค้า">
<input id="address" placeholder="ที่อยู่">
</div>

<div class="right">
<p id="invoiceNo"></p>
<input type="date" id="date">
</div>
</div>

<h3>รายการสินค้า</h3>

<input id="name" placeholder="สินค้า">
<input id="qty" type="number" placeholder="จำนวน">
<input id="price" type="number" placeholder="ราคา">
<input id="discount" type="number" placeholder="ส่วนลด">

<button onclick="addItem()">เพิ่มสินค้า</button>

<table>
<thead>
<tr>
<th>#</th><th>สินค้า</th><th>จำนวน</th><th>ราคา</th><th>ส่วนลด</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>

<div class="footer">
<div>ผู้อนุมัติ<div class="line"></div></div>
<div>ผู้รับเงิน<div class="line"></div></div>
<div>ผู้รับสินค้า<div class="line"></div></div>
<div>วันที่รับ<div class="line"></div></div>
</div>

<button onclick="saveBill()">บันทึก</button>
<button onclick="window.print()">PDF</button>

</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none">
<h2>Dashboard</h2>
<canvas id="monthChart"></canvas>
<canvas id="yearChart"></canvas>
</div>

<!-- CALCULATOR -->
<div id="calcPage" class="container" style="display:none">
<div class="calc">
<input id="calcDisplay" readonly>
<div class="calc-grid">
<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">-</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button>
</div>
</div>
</div>

<script>

let items=[];
let bills=[];

let count=localStorage.getItem("invoiceCount")||0;
count++;
localStorage.setItem("invoiceCount",count);

let invoiceNumber="INV-"+String(count).padStart(4,'0');
invoiceNo.innerText=invoiceNumber;

function addItem(){
let total=(qty.value*price.value)-discount.value;
items.push({name:name.value,qty:+qty.value,price:+price.value,discount:+discount.value,total});
render();
}

function render(){
let html="",total=0;
items.forEach((i,x)=>{
html+=`<tr><td>${x+1}</td><td>${i.name}</td><td>${i.qty}</td><td>${i.price}</td><td>${i.discount}</td><td>${i.total}</td></tr>`;
total+=i.total;
});
table.innerHTML=html;

let vat=total*0.07;
let grand=total+vat;

summary.innerText=`รวม ${total} | VAT ${vat.toFixed(2)} | สุทธิ ${grand.toFixed(2)}`;
}

function saveBill(){
let total=items.reduce((s,i)=>s+i.total,0);
let bill={date:date.value,grand:total};
bills.push(bill);
alert("บันทึกแล้ว");
updateChart();
}

/* DASHBOARD */
function updateChart(){
let months={},years={};

bills.forEach(b=>{
let m=b.date.slice(0,7);
let y=b.date.slice(0,4);

months[m]=(months[m]||0)+b.grand;
years[y]=(years[y]||0)+b.grand;
});

new Chart(monthChart,{type:"bar",
data:{labels:Object.keys(months),
datasets:[{label:"รายเดือน",data:Object.values(months)}]}
});

new Chart(yearChart,{type:"line",
data:{labels:Object.keys(years),
datasets:[{label:"รายปี",data:Object.values(years)}]}
});
}

/* CALC */
function press(v){calcDisplay.value+=v}
function calculate(){calcDisplay.value=eval(calcDisplay.value)}

function showPage(p){
billPage.style.display=p==="bill"?"block":"none";
dashboardPage.style.display=p==="dashboard"?"block":"none";
calcPage.style.display=p==="calc"?"block":"none";
}

function changeDocType(v){
docType.innerText=
v==="invoice"?"ใบกำกับภาษี":
v==="quote"?"ใบเสนอราคา":"ใบเสร็จ";
}

</script>

</body>
</html>
