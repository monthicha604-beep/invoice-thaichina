<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China ERP FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Sarabun';background:#eef2f7;margin:0}

.nav{background:#111;color:#fff;padding:12px;display:flex;gap:10px}
.nav button{background:none;border:none;color:#fff;cursor:pointer}

.container{
width:210mm;
min-height:297mm;
margin:20px auto;
background:#fff;
padding:12mm;
border:3px solid gold;
}

.header{display:flex;justify-content:space-between}
.left{width:55%}
.right{text-align:right}

input,select{width:100%;padding:6px;margin:4px 0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}

.summary{text-align:right;margin-top:10px}

.box{border:1px solid #000;height:50px;margin:5px}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
}

@media print{
.nav,button,input,select{display:none}
.container{width:210mm;height:297mm}
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
</div>

<!-- BILL -->
<div id="billPage" class="container">

<h2 id="docType">ใบกำกับภาษี</h2>

<select onchange="changeType(this.value)">
<option value="INV">INV</option>
<option value="RC">RC</option>
<option value="PO">PO</option>
</select>

<div class="header">

<div class="left">

<input id="customerSearch" placeholder="ค้นหาลูกค้า" oninput="searchCustomer()">
<div id="suggestions"></div>

<div id="topCustomers"></div>

<input id="customer" placeholder="ลูกค้า">
<input id="address" placeholder="ที่อยู่">
<input id="tax" placeholder="เลขประจำตัวผู้เสียภาษี">

<button onclick="saveCustomer()">บันทึก</button>

</div>

<div class="right">
<p id="invoiceNo"></p>
<input type="date" id="date">
<button onclick="prevInvoice()">ย้อนเลข</button>
</div>

</div>

<!-- ITEM -->
<input id="name" placeholder="รายการสินค้า">
<input id="qty" placeholder="จำนวน">
<input id="dozen" placeholder="โหล">
<input id="yard" placeholder="หลา">
<input id="price" placeholder="ราคา">
<input id="discount" placeholder="ส่วนลด">

<button onclick="addItem()">เพิ่มสินค้า</button>

<table>
<thead>
<tr>
<th>ลำดับ</th><th>รายการสินค้า</th><th>จำนวน</th><th>โหล</th><th>หลา</th><th>ราคา</th><th>ส่วนลด</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="summary">
<p id="subtotal"></p>
<p id="vat"></p>
<p id="total"></p>
</div>

<button onclick="openPayment()">บันทึก</button>
<button onclick="window.print()">PDF</button>

</div>

<!-- PAYMENT -->
<div id="paymentModal" class="modal">
<div class="modal-box">
<h3>เลือกการชำระเงิน</h3>
<button onclick="cash()">เงินสด</button>
<button onclick="showCredit()">CREDIT</button>

<div id="creditBox" style="display:none">
<input type="date" id="due">
<button onclick="confirmCredit()">ยืนยัน</button>
</div>
</div>
</div>

<!-- HISTORY -->
<div id="historyPage" class="container" style="display:none">

<h2>ประวัติ</h2>

<input id="search" placeholder="ค้นหา">
<button onclick="loadHistory()">ค้นหา</button>

<table>
<thead>
<tr><th>เลขบิล</th><th>ลูกค้า</th><th>ยอด</th><th>สถานะ</th><th>จัดการ</th></tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none">
<canvas id="chart"></canvas>
</div>

<script>

let items=[];
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let customers=JSON.parse(localStorage.getItem("customers")||"[]");
let prefix="INV";

/* ID */
function generateID(){
let c=localStorage.getItem(prefix)||0;
c++;
localStorage.setItem(prefix,c);
invoiceNo.innerText=prefix+"-"+String(c).padStart(4,'0');
}
generateID();

function prevInvoice(){
let c=localStorage.getItem(prefix)||1;
c--;
localStorage.setItem(prefix,c);
generateID();
}

function changeType(v){
prefix=v;
generateID();
}

/* ITEMS */
function addItem(){
let total=(qty.value*price.value)-discount.value;
items.push({name:name.value,qty,dozen,yard,price,discount,total});
render();
}

function render(){
let html="",sum=0;
items.forEach((i,x)=>{
html+=`<tr>
<td>${x+1}</td>
<td>${i.name}</td>
<td>${i.qty.value}</td>
<td>${i.dozen.value}</td>
<td>${i.yard.value}</td>
<td>${i.price.value}</td>
<td>${i.discount.value}</td>
<td>${i.total}</td>
</tr>`;
sum+=i.total;
});
table.innerHTML=html;

let vatVal=sum*0.07;
subtotal.innerText="Subtotal: "+sum;
vat.innerText="VAT: "+vatVal;
total.innerText="Total: "+(sum+vatVal);
}

/* CUSTOMER */
function saveCustomer(){
customers.push({name:customer.value,address:address.value,tax:tax.value});
localStorage.setItem("customers",JSON.stringify(customers));
loadTop();
}

function loadTop(){
let html="";
customers.slice(-10).forEach((c,i)=>{
html+=`<div>
<button onclick="selectCust(${i})">${c.name}</button>
<button onclick="deleteCust(${i})">❌</button>
</div>`;
});
topCustomers.innerHTML=html;
}
loadTop();

function deleteCust(i){
customers.splice(i,1);
localStorage.setItem("customers",JSON.stringify(customers));
loadTop();
}

function selectCust(i){
let c=customers[i];
customer.value=c.name;
address.value=c.address;
tax.value=c.tax;
}

function searchCustomer(){
let val=customerSearch.value.toLowerCase();
let html="";
customers.forEach((c,i)=>{
if(c.name.toLowerCase().includes(val)){
html+=`<div onclick="selectCust(${i})">${c.name}</div>`;
}
});
suggestions.innerHTML=html;
}

/* PAYMENT */
function openPayment(){paymentModal.style.display="flex"}
function cash(){saveBill("เงินสด","รับเงินแล้ว")}
function showCredit(){creditBox.style.display="block"}
function confirmCredit(){saveBill("CREDIT",due.value)}

/* SAVE */
function saveBill(method,note){
let totalVal=items.reduce((s,i)=>s+i.total,0);

let bill={
id:invoiceNo.innerText,
customer:customer.value,
date:date.value,
total:totalVal,
payment:method,
note,
status:"active"
};

bills.push(bill);
localStorage.setItem("bills",JSON.stringify(bills));
alert("บันทึกแล้ว");
paymentModal.style.display="none";
}

/* HISTORY */
function loadHistory(){
let html="";
bills.forEach((b,i)=>{
html+=`<tr>
<td>${b.id}</td>
<td>${b.customer}</td>
<td>${b.total}</td>
<td>${b.status}</td>
<td><button onclick="cancelBill(${i})">ยกเลิก</button></td>
</tr>`;
});
historyTable.innerHTML=html;
}

function cancelBill(i){
bills[i].status="cancelled";
localStorage.setItem("bills",JSON.stringify(bills));
loadHistory();
}

/* DASHBOARD */
function loadChart(){
let data=bills.map(b=>b.total);
new Chart(chart,{type:"bar",data:{labels:data,datasets:[{data}]}})
}

/* PAGE */
function showPage(p){
billPage.style.display="none";
historyPage.style.display="none";
dashboardPage.style.display="none";

if(p==="bill") billPage.style.display="block";
if(p==="history"){historyPage.style.display="block";loadHistory();}
if(p==="dashboard"){dashboardPage.style.display="block";loadChart();}
}

</script>

</body>
</html>
