<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>THAI CHINA FABRIC CLOUD ERP</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI'; margin:0; background:#eef1f7; }
    .menu { background:#1f2a44; color:white; padding:15px; display:flex; gap:10px; }
    .menu button { background:none; border:none; color:white; cursor:pointer; }
    .container { padding:20px; }
    .box { background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    table, th, td { border:1px solid #ccc; }
    th { background:#1f2a44; color:white; }
    th, td { padding:6px; text-align:center; }
    input, select { width:100%; padding:5px; margin:3px 0; }
    .btn { padding:6px 12px; margin-top:10px; background:#1f2a44; color:white; border:none; }
  </style>
</head>
<body>

<div class="menu">
  <button onclick="openDoc()">ออกบิล</button>
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('report')">รายงาน</button>
  <button onclick="showPage('customerReport')">ยอดขายตามลูกค้า</button>
</div>

<div class="container">
  <div id="documentPage" class="box">
    <h2>ใบแจ้งหนี้</h2>
    เลขที่: <b id="docNo"></b>
    <input type="text" id="customerName" placeholder="ชื่อลูกค้า">
    <input type="date" id="date">

    <table id="itemTable">
      <thead>
        <tr>
          <th>ลำดับ</th>
          <th>รายการ</th>
          <th>จำนวน</th>
          <th>ราคา</th>
          <th>รวม</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button class="btn" onclick="addRow()">เพิ่ม</button>
    <h3>รวม: <span id="grandTotal">0</span></h3>

    <select id="payment">
      <option>เงินสด</option>
      <option>โอน</option>
      <option>CREDIT</option>
    </select>

    <button class="btn" onclick="saveDoc()">บันทึก</button>
  </div>

  <div id="dashboard" class="box" style="display:none">
    <h2>Dashboard</h2>
    <canvas id="salesChart"></canvas>
  </div>

  <div id="report" class="box" style="display:none">
    <h2>รายงานทั้งหมด</h2>
    <table>
      <thead><tr><th>เลขที่</th><th>ลูกค้า</th><th>ยอด</th></tr></thead>
      <tbody id="reportTable"></tbody>
    </table>
  </div>

  <div id="customerReport" class="box" style="display:none">
    <h2>ยอดขายตามลูกค้า</h2>
    <input type="text" id="searchCustomer" placeholder="พิมพ์ชื่อลูกค้า" oninput="searchCustomer()">
    <table>
      <thead><tr><th>เลขที่</th><th>ยอด</th></tr></thead>
      <tbody id="customerTable"></tbody>
    </table>
  </div>
</div>

<script>
// Firebase config (ต้องไปเอาจาก Firebase)
var firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  authDomain: "YOUR-PROJECT.firebaseapp.com",
  projectId: "YOUR-PROJECT"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let counter = 1;
document.getElementById("docNo").innerText = "INV-"+counter;

function openDoc(){ showPage('documentPage'); }

function showPage(page){
  document.getElementById('documentPage').style.display='none';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('report').style.display='none';
  document.getElementById('customerReport').style.display='none';
  document.getElementById(page).style.display='block';
  loadReport();
  loadChart();
}

function addRow(){
  let table = document.querySelector('#itemTable tbody');
  let row = table.insertRow();
  let rowCount = table.rows.length;
  row.innerHTML = `
    <td>${rowCount}</td>
    <td><input type='text'></td>
    <td><input type='number' class='qty' oninput='calculate()'></td>
    <td><input type='number' class='price' oninput='calculate()'></td>
    <td class='total'>0</td>`;
}
addRow();

function calculate(){
  let qty=document.querySelectorAll('.qty');
  let price=document.querySelectorAll('.price');
  let total=document.querySelectorAll('.total');
  let sum=0;
  for(let i=0;i<qty.length;i++){
    let s=(qty[i].value||0)*(price[i].value||0);
    total[i].innerText=s;
    sum+=s;
  }
  document.getElementById('grandTotal').innerText=sum;
}

function saveDoc(){
  let docNo=document.getElementById('docNo').innerText;
  let customer=document.getElementById('customerName').value;
  let total=document.getElementById('grandTotal').innerText;
  let payment=document.getElementById('payment').value;

  db.collection('documents').add({docNo,customer,total,payment,date:new Date()});

  counter++;
  document.getElementById('docNo').innerText='INV-'+counter;
  alert('บันทึกเรียบร้อย (เก็บออนไลน์)');
}

function loadReport(){
  let table=document.getElementById('reportTable');
  table.innerHTML='';
  db.collection('documents').get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let d=doc.data();
      let row=table.insertRow();
      row.innerHTML=`<td>${d.docNo}</td><td>${d.customer}</td><td>${d.total}</td>`;
    });
  });
}

function searchCustomer(){
  let name=document.getElementById('searchCustomer').value;
  let table=document.getElementById('customerTable');
  table.innerHTML='';
  db.collection('documents').where('customer','==',name).get().then(snapshot=>{
    snapshot.forEach(doc=>{
      let d=doc.data();
      let row=table.insertRow();
      row.innerHTML=`<td>${d.docNo}</td><td>${d.total}</td>`;
    });
  });
}

function loadChart(){
  db.collection('documents').get().then(snapshot=>{
    let totals={};
    snapshot.forEach(doc=>{
      let d=doc.data();
      let m=new Date(d.date.seconds*1000).getMonth()+1;
      if(!totals[m]) totals[m]=0;
      totals[m]+=Number(d.total);
    });

    new Chart(document.getElementById('salesChart'),{
      type:'bar',
      data:{labels:Object.keys(totals),datasets:[{label:'ยอดขาย',data:Object.values(totals)}]}
    });
  });
}
</script>

</body>
</html>
