<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China ERP (Mini SeniorSoft)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Sarabun';margin:0;background:#eef2f7}
.nav{background:#111;color:#fff;padding:10px}
.nav button{margin-right:10px}

.container{
width:210mm;
min-height:297mm;
background:#fff;
margin:20px auto;
padding:15mm;
border:2px solid #d4af37;
}

.header{display:flex;justify-content:space-between}
.box{border:1px solid #ccc;padding:10px;width:48%}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}

.summary{width:250px;margin-left:auto;border:1px solid #ddd;padding:10px;margin-top:10px}

.footer{display:grid;grid-template-columns:repeat(3,1fr);margin-top:40px}
.line{border-bottom:1px solid #000;margin-top:40px}

.modal{
display:none;
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}
.modal-box{background:#fff;padding:20px}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('customer')">ลูกค้า</button>
</div>

<!-- ================= BILL ================= -->
<div id="billPage" class="container">

<div style="text-align:center">
<img src="logo.png" width="80"><br>
<b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
เลขผู้เสียภาษี 0103566005842
<h2 id="docType">ใบกำกับภาษี</h2>
</div>

<select onchange="changeType(this.value)">
<option value="INV">ใบกำกับภาษี</option>
<option value="RC">ใบเสร็จ</option>
<option value="PO">ใบสั่งสินค้า</option>
</select>

<div class="header">
<div class="box">
ลูกค้า
<input id="customer">
ที่อยู่
<input id="address">
เลขภาษี
<input id="tax">
</div>

<div class="box">
เลขที่: <span id="invoiceNo"></span><br>
วันที่: <input type="date" id="date"><br>
<button onclick="prevBill()">◀️</button>
<button onclick="nextBill()">▶️</button>
</div>
</div>

<input id="name" placeholder="สินค้า">
<input id="qty" placeholder="จำนวน">
<input id="price" placeholder="ราคา">
<input id="discount" placeholder="ส่วนลด">

<button onclick="addItem()">เพิ่ม</button>

<table>
<thead>
<tr>
<th>#</th><th>สินค้า</th><th>จำนวน</th><th>ราคา</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="summary">
<p>Subtotal: <span id="subtotal"></span></p>
<p id="vatRow">VAT: <span id="vat"></span></p>
<p>Total: <span id="total"></span></p>
</div>

<button onclick="openPayment()">บันทึก</button>
<button onclick="window.print()">PDF</button>

<div class="footer">
<div>ผู้อนุมัติ<div class="line"></div></div>
<div>ผู้รับสินค้า<div class="line"></div></div>
<div>วันที่รับสินค้า<div class="line"></div></div>
</div>

</div>

<!-- ================= HISTORY ================= -->
<div id="historyPage" class="container" style="display:none">
<h2>ประวัติ</h2>
<input id="search">
<button onclick="loadHistory()">ค้นหา</button>
<table>
<thead>
<tr>
<th>เลขบิล</th><th>ลูกค้า</th><th>ยอด</th><th>สถานะ</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboardPage" class="container" style="display:none">
<canvas id="chart"></canvas>
</div>

<!-- ================= CUSTOMER ================= -->
<div id="customerPage" class="container" style="display:none">
<h2>ลูกค้า</h2>
<input id="cname" placeholder="ชื่อลูกค้า">
<input id="caddress" placeholder="ที่อยู่">
<input id="ctax" placeholder="เลขภาษี">
<button onclick="addCustomer()">เพิ่มลูกค้า</button>

<table>
<tbody id="customerTable"></tbody>
</table>
</div>

<!-- PAYMENT -->
<div id="paymentModal" class="modal">
<div class="modal-box">
<button onclick="cash()">เงินสด</button>
<button onclick="credit()">CREDIT</button>
<input type="date" id="due">
</div>
</div>

<script>

let items=[];
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let customers=JSON.parse(localStorage.getItem("customers")||"[]");

let prefix="INV";
let currentIndex=-1;

/* TYPE */
function changeType(v){
prefix=v;
docType.innerText=v==="INV"?"ใบกำกับภาษี":v==="RC"?"ใบเสร็จ":"ใบสั่งสินค้า";
generateID();
render();
}

/* ID */
function generateID(){
let c=localStorage.getItem(prefix)||0;
c++;
localStorage.setItem(prefix,c);
invoiceNo.innerText=prefix+"-"+String(c).padStart(4,'0');
}
generateID();

/* ITEM */
function addItem(){
let total=(qty.value*price.value)-discount.value;
items.push({name:name.value,qty:qty.value,price:price.value,total});
render();
}

function render(){
let html="",sum=0;
items.forEach((i,x)=>{
html+=`<tr>
<td>${x+1}</td>
<td>${i.name}</td>
<td>${i.qty}</td>
<td>${i.price}</td>
<td>${i.total}</td>
</tr>`;
sum+=i.total;
});
table.innerHTML=html;

let vatVal = prefix==="INV"?sum*0.07:0;

subtotal.innerText=sum.toFixed(2);

if(prefix==="INV"){
vatRow.style.display="block";
vat.innerText=vatVal.toFixed(2);
}else{
vatRow.style.display="none";
}

total.innerText=(sum+vatVal).toFixed(2);
}

/* SAVE */
function openPayment(){paymentModal.style.display="flex"}

function cash(){saveBill("เงินสด")}
function credit(){saveBill("CREDIT")}

function saveBill(method){
let sum=items.reduce((s,i)=>s+i.total,0);
let vatVal = prefix==="INV"?sum*0.07:0;

let bill={
id:invoiceNo.innerText,
customer:customer.value,
total:sum+vatVal,
payment:method,
status:"active",
items:items
};

bills.push(bill);
currentIndex=bills.length-1;

localStorage.setItem("bills",JSON.stringify(bills));
paymentModal.style.display="none";
alert("บันทึกแล้ว");
}

/* NAV */
function prevBill(){
if(currentIndex>0){
currentIndex--;
loadBill();
}
}

function nextBill(){
items=[];
customer.value="";
generateID();
render();
}

function loadBill(){
let b=bills[currentIndex];
customer.value=b.customer;
invoiceNo.innerText=b.id;
items=b.items;
render();
}

/* HISTORY */
function loadHistory(){
let html="";
bills.forEach(b=>{
html+=`<tr>
<td>${b.id}</td>
<td>${b.customer}</td>
<td>${b.total}</td>
<td>${b.status}</td>
</tr>`;
});
historyTable.innerHTML=html;
}

/* DASHBOARD */
function loadChart(){
let data=bills.map(b=>b.total);
new Chart(chart,{
type:"bar",
data:{labels:bills.map(b=>b.id),datasets:[{data:data}]}
});
}

/* CUSTOMER */
function addCustomer(){
customers.push({
name:cname.value,
address:caddress.value,
tax:ctax.value
});
localStorage.setItem("customers",JSON.stringify(customers));
loadCustomers();
}

function loadCustomers(){
let html="";
customers.forEach(c=>{
html+=`<tr><td>${c.name}</td><td>${c.address}</td></tr>`;
});
customerTable.innerHTML=html;
}
loadCustomers();

/* PAGE */
function showPage(p){
billPage.style.display="none";
historyPage.style.display="none";
dashboardPage.style.display="none";
customerPage.style.display="none";

if(p==="bill") billPage.style.display="block";
if(p==="history"){historyPage.style.display="block";loadHistory();}
if(p==="dashboard"){dashboardPage.style.display="block";loadChart();}
if(p==="customer") customerPage.style.display="block";
}

</script>
</body>
</html>
