<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China ERP Final</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">

<style>
body{font-family:'Sarabun';background:#eef2f7;margin:0}

.nav{background:#111;color:#fff;padding:12px;display:flex;gap:10px}
.nav button{background:none;border:none;color:#fff;cursor:pointer}

/* A4 */
.container{
width:210mm;
min-height:297mm;
margin:20px auto;
background:#fff;
padding:15mm;
border:2px solid #d4af37;
display:flex;
flex-direction:column;
justify-content:space-between;
}

/* HEADER */
.company{
text-align:center;
border-bottom:2px solid #d4af37;
padding-bottom:10px;
}
.company img{width:80px}
.company-name{font-size:18px;font-weight:bold}
.doc-title{font-size:20px;font-weight:bold;margin-top:10px}

/* SECTION */
.header{display:flex;justify-content:space-between;margin-top:10px}
.box{border:1px solid #ddd;padding:10px;border-radius:6px;width:48%}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
th{background:#f8f8f8}

/* SUMMARY */
.summary{
width:260px;
margin-left:auto;
border:1px solid #ddd;
padding:10px;
margin-top:10px;
}
.summary p{display:flex;justify-content:space-between}

/* FOOTER SIGN */
.footer{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.sign{
text-align:center;
}
.line{
border-bottom:1px solid #000;
margin-top:40px;
}

/* PRINT */
@media print{
.nav,button,input,select{display:none}
.container{width:210mm;height:297mm}
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
</div>

<!-- BILL -->
<div id="billPage" class="container">

<div>

<!-- COMPANY -->
<div class="company">
<img src="logo.png">
<div class="company-name">ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</div>
THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
3178 ซอยเอกชัย 109 แขวงบางบอนใต้ เขตบางบอน กรุงเทพมหานคร 10150<br>
เลขผู้เสียภาษี: 0103566005842
<div class="doc-title" id="docType">ใบกำกับภาษี</div>
</div>

<select onchange="changeType(this.value)">
<option value="INV">ใบกำกับภาษี</option>
<option value="RC">ใบเสร็จ</option>
<option value="PO">ใบสั่งสินค้า</option>
</select>

<div class="header">
<div class="box">
<input id="customer" placeholder="ลูกค้า">
<input id="address" placeholder="ที่อยู่">
</div>

<div class="box">
เลขที่: <span id="invoiceNo"></span><br>
วันที่: <input type="date" id="date">
</div>
</div>

<!-- ITEM -->
<input id="price" placeholder="ราคา">
<button onclick="addItem()">เพิ่ม</button>

<table>
<thead><tr><th>#</th><th>ราคา</th></tr></thead>
<tbody id="table"></tbody>
</table>

<div class="summary">
<p><span>Subtotal</span><span id="subtotal"></span></p>
<p id="vatRow"><span>VAT</span><span id="vat"></span></p>
<p><span>Total</span><span id="total"></span></p>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
<div class="sign">ผู้อนุมัติ<div class="line"></div></div>
<div class="sign">ผู้รับสินค้า<div class="line"></div></div>
<div class="sign">วันที่รับสินค้า<div class="line"></div></div>
</div>

</div>

<script>

let items=[];
let prefix="INV";

/* TYPE */
function changeType(v){
prefix=v;
docType.innerText=
v==="INV"?"ใบกำกับภาษี":
v==="RC"?"ใบเสร็จ":"ใบสั่งสินค้า";
}

/* ITEM */
function addItem(){
items.push(Number(price.value));
render();
}

function render(){
let html="",sum=0;
items.forEach((i,x)=>{
html+=`<tr><td>${x+1}</td><td>${i}</td></tr>`;
sum+=i;
});
table.innerHTML=html;

let vatVal=prefix==="INV"?sum*0.07:0;

subtotal.innerText=sum;
if(prefix==="INV"){
vatRow.style.display="flex";
vat.innerText=vatVal.toFixed(2);
}else{
vatRow.style.display="none";
}
total.innerText=(sum+vatVal).toFixed(2);
}

/* PAGE */
function showPage(p){
billPage.style.display="block";
}

invoiceNo.innerText="INV-"+Date.now();

</script>

</body>
</html>
