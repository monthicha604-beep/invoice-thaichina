<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ใบกำกับภาษี</title>

<style>
body {
  font-family: "Sarabun", sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
h1 {
  text-align: center;
  letter-spacing: 2px;
}
input {
  width: 100%;
  padding: 8px;
  margin: 6px 0;
  border: 1px solid #ddd;
}
button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
}
table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}
th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}
.footer {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  text-align: center;
}
.line {
  border-bottom: 1px solid black;
  margin-top: 30px;
}
</style>

</head>

<body>

<div class="container">

<div style="text-align:center;">
  <img src="logo.png" style="width:120px;">
  <h1>ใบกำกับภาษี / INVOICE</h1>
</div>
  
<input id="customer" placeholder="ชื่อลูกค้า">
<input id="taxId" placeholder="เลขผู้เสียภาษี">
<input id="address" placeholder="ที่อยู่จัดส่ง">

<h3>รายการสินค้า</h3>

<input id="name" placeholder="สินค้า">
<input id="price" type="number" placeholder="ราคา">
<input id="qty" type="number" placeholder="จำนวน">

<button onclick="addItem()">เพิ่มรายการ</button>

<table>
<thead>
<tr>
<th>สินค้า</th>
<th>ราคา</th>
<th>จำนวน</th>
<th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>

<div class="footer">
  <div>
    ผู้อนุมัติ
    <div class="line"></div>
  </div>
  <div>
    ผู้รับเงิน
    <div class="line"></div>
  </div>
  <div>
    ผู้รับสินค้า
    <div class="line"></div>
  </div>
  <div>
    วันที่รับ
    <div class="line"></div>
  </div>
</div>

<br>
<button onclick="printBill()">🧾 พิมพ์ / PDF</button>

</div>

<script>
let items = [];

function addItem() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let qty = document.getElementById("qty").value;

  let total = price * qty;

  items.push({name, price, qty, total});
  render();
}

function render() {
  let html = "";
  let total = 0;

  items.forEach(i => {
    html += `<tr>
      <td>${i.name}</td>
      <td>${i.price}</td>
      <td>${i.qty}</td>
      <td>${i.total}</td>
    </tr>`;
    total += i.total;
  });

  document.getElementById("table").innerHTML = html;

  let vat = total * 0.07;
  let grand = total + vat;

  document.getElementById("summary").innerHTML =
    `รวม: ${total.toFixed(2)} | VAT 7%: ${vat.toFixed(2)} | สุทธิ: ${grand.toFixed(2)}`;
}

function printBill() {
  window.print();
}
</script>

</body>
</html>
