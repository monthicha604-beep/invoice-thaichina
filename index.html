<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China ERP Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Sarabun';background:#eef2f7;margin:0}

.nav{background:#111;color:#fff;padding:12px;display:flex;gap:10px}
.nav button{background:none;border:none;color:#fff;cursor:pointer}

.container{
width:210mm;
min-height:297mm;
margin:20px auto;
background:#fff;
padding:12mm;
border:3px solid gold;
box-shadow:0 8px 25px rgba(0,0,0,0.1)
}

.header{display:flex;justify-content:space-between}
.left{width:55%}
.right{width:40%;text-align:right}

input,select{width:100%;padding:6px;margin:4px 0;border:1px solid #ddd}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
th{background:#f1f5f9}

.summary{
text-align:right;
margin-top:10px;
}

.footer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
}

.box{
border:1px solid #000;
height:50px;
display:flex;
align-items:flex-end;
justify-content:center;
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
}

@media print{
.nav,button,input,select{display:none}
.container{width:210mm;height:297mm}
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
</div>

<div id="billPage" class="container">

<div style="text-align:center">
<img src="logo.png" style="width:80px"><br>
<b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
3178 ซอยเอกชัย 109 แขวงบางบอนใต้ เขตบางบอน กรุงเทพฯ<br>
เลขผู้เสียภาษี 0103566005842
<h2 id="docType">ใบกำกับภาษี</h2>
</div>

<select onchange="changeDocType(this.value)">
<option value="INV">ใบกำกับภาษี</option>
<option value="RC">ใบเสร็จรับเงิน</option>
<option value="PO">ใบสั่งสินค้า</option>
</select>

<div class="header">

<div class="left">
<input id="customerSearch" placeholder="ค้นหาลูกค้า" oninput="searchCustomer()">
<div id="suggestions"></div>

<div id="topCustomers"></div>

<input id="customer" placeholder="ลูกค้า">
<input id="address" placeholder="ที่อยู่">
<input id="customerTax" placeholder="เลขภาษี">
<button onclick="saveCustomer()">บันทึก</button>
</div>

<div class="right">
<p id="invoiceNo"></p>
<input type="date" id="date">
<button onclick="prevInvoice()">ย้อนเลข</button>
</div>

</div>

<!-- ITEM -->
<input id="name" placeholder="สินค้า">
<input id="qty" placeholder="จำนวน">
<input id="dozen" placeholder="โหล">
<input id="yard" placeholder="หลา">
<input id="price" placeholder="ราคา">
<input id="discount" placeholder="ส่วนลด">

<button onclick="addItem()">เพิ่มสินค้า</button>

<table>
<thead>
<tr>
<th>#</th><th>สินค้า</th><th>จำนวน</th><th>โหล</th><th>หลา</th><th>ราคา</th><th>ส่วนลด</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="summary">
<p id="subtotal"></p>
<p id="vat"></p>
<p id="total"></p>
</div>

<div class="footer">
<div class="box">ผู้อนุมัติ</div>
<div class="box">ผู้รับเงิน</div>
<div class="box">ผู้รับสินค้า</div>
<div class="box">วันที่รับ</div>
</div>

<button onclick="openPayment()">บันทึก</button>
<button onclick="window.print()">PDF</button>

</div>

<!-- PAYMENT -->
<div id="paymentModal" class="modal">
<div class="modal-box">
<h3>ชำระเงิน</h3>
<button onclick="cash()">เงินสด</button>
<button onclick="credit()">CREDIT</button>
<div id="creditBox" style="display:none">
<input type="date" id="dueDate">
<button onclick="confirmCredit()">ยืนยัน</button>
</div>
</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzP8MW4qH9lkdS56vj-6c_4jI6R0yWNYNolRWkH_NVvCTNHLnu9wlrpuvksN9MCeJng/exec";

let items=[];
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let customers=JSON.parse(localStorage.getItem("customers")||"[]");

let prefix="INV";

function changeDocType(v){
prefix=v;
generateID();
}

function generateID(){
let c=localStorage.getItem(prefix)||0;
c++;
localStorage.setItem(prefix,c);
invoiceNo.innerText=prefix+"-"+String(c).padStart(4,'0');
}
generateID();

function prevInvoice(){
let c=localStorage.getItem(prefix)||1;
c--;
localStorage.setItem(prefix,c);
generateID();
}

function addItem(){
let total=(qty.value*price.value)-discount.value;
items.push({name:name.value,qty,dozen,yard,price,discount,total});
render();
}

function render(){
let html="",sum=0;
items.forEach((i,x)=>{
html+=`<tr>
<td>${x+1}</td>
<td>${i.name}</td>
<td>${i.qty.value}</td>
<td>${i.dozen.value}</td>
<td>${i.yard.value}</td>
<td>${i.price.value}</td>
<td>${i.discount.value}</td>
<td>${i.total}</td>
</tr>`;
sum+=i.total;
});
table.innerHTML=html;

let vatVal=sum*0.07;
subtotal.innerText="Subtotal: "+sum;
vat.innerText="VAT: "+vatVal;
total.innerText="Total: "+(sum+vatVal);
}

/* CUSTOMER */
function saveCustomer(){
customers.push({
name:customer.value,
address:address.value,
tax:customerTax.value
});
localStorage.setItem("customers",JSON.stringify(customers));
}

function searchCustomer(){
let val=customerSearch.value.toLowerCase();
let html="";
customers.filter(c=>c.name.toLowerCase().includes(val))
.forEach(c=>{
html+=`<div onclick="selectCust('${c.name}','${c.address}','${c.tax}')">${c.name}</div>`;
});
suggestions.innerHTML=html;
}

function selectCust(n,a,t){
customer.value=n;
address.value=a;
customerTax.value=t;
}

/* PAYMENT */
function openPayment(){
paymentModal.style.display="flex";
}

function cash(){
saveBill("เงินสด","รับเงินแล้ว");
}

function credit(){
creditBox.style.display="block";
}

function confirmCredit(){
saveBill("CREDIT",dueDate.value);
}

/* SAVE */
function saveBill(method,extra){

let totalVal=items.reduce((s,i)=>s+i.total,0);

let bill={
id:invoiceNo.innerText,
customer:customer.value,
date:date.value,
total:totalVal,
payment:method,
note:extra
};

bills.push(bill);
localStorage.setItem("bills",JSON.stringify(bills));

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(bill)
});

alert("บันทึกแล้ว");
paymentModal.style.display="none";

}

function showPage(p){
billPage.style.display=p==="bill"?"block":"none";
}

</script>

</body>
</html>
