<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Thai China ERP Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Sarabun';background:#eef2f7;margin:0}

.nav{background:#111;color:#fff;padding:12px;display:flex;gap:10px}
.nav button{background:none;border:none;color:#fff;cursor:pointer}

/* GOLD FRAME */
.container{
width:210mm;
min-height:297mm;
margin:20px auto;
background:#fff;
padding:15mm;
border:3px solid gold;
box-shadow:0 8px 25px rgba(0,0,0,0.1)
}

.header{display:flex;justify-content:space-between;margin-top:15px}
.left,.right{width:48%}
.right{text-align:right}

input,select{width:100%;padding:6px;margin:4px 0;border:1px solid #ddd}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
th{background:#f1f5f9}

.footer{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:30px;
text-align:center
}

.box{
border:1px solid #000;
height:50px;
display:flex;
align-items:flex-end;
justify-content:center
}

.topCustomers button{margin:3px}

@media print{
.nav,button,input,select{display:none}
.container{
width:210mm;
height:297mm;
border:2px solid gold;
}
}

/* POPUP */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
width:300px;
}
</style>
</head>

<body>

<div class="nav">
<button onclick="showPage('bill')">ออกบิล</button>
<button onclick="showPage('history')">ประวัติ</button>
<button onclick="showPage('dashboard')">Dashboard</button>
</div>

<!-- BILL -->
<div id="billPage" class="container">

<div style="text-align:center;line-height:1.6;">
<img src="logo.png" style="width:80px"><br><br>

<b>ห้างหุ้นส่วนจำกัด ผ้าไทย จีน</b><br>
THAI CHINA FABRIC LIMITED PARTNERSHIP<br>
3178 ซอยเอกชัย 109 แขวงบางบอนใต้ เขตบางบอน<br>
กรุงเทพมหานคร 10150<br>
เลขผู้เสียภาษี: 0103566005842

<h2 id="docType">ใบกำกับภาษี</h2>
</div>

<select onchange="changeDocType(this.value)">
<option value="INV">ใบกำกับภาษี</option>
<option value="RC">ใบเสร็จรับเงิน</option>
<option value="PO">ใบสั่งสินค้า</option>
</select>

<div class="header">

<div class="left">

<input id="customerSearch" placeholder="ค้นหาลูกค้า" oninput="searchCustomer()">
<div id="suggestions"></div>

<div id="topCustomers"></div>

<input id="customer" placeholder="ลูกค้า">
<input id="address" placeholder="ที่อยู่">
<input id="customerTax" placeholder="เลขผู้เสียภาษี">

<button onclick="saveCustomer()">บันทึกลูกค้า</button>

</div>

<div class="right">
<p id="invoiceNo"></p>
<input type="date" id="date">
</div>

</div>

<!-- ITEMS -->
<input id="name" placeholder="รายการสินค้า">
<input id="qty" type="number" placeholder="จำนวน">
<input id="dozen" type="number" placeholder="โหล">
<input id="yard" type="number" placeholder="หลา">
<input id="price" type="number" placeholder="ราคา">
<input id="discount" type="number" placeholder="ส่วนลด">

<button onclick="addItem()">เพิ่มสินค้า</button>

<table>
<thead>
<tr>
<th>ลำดับ</th><th>รายการสินค้า</th><th>จำนวน</th><th>โหล</th><th>หลา</th><th>ราคา</th><th>ส่วนลด</th><th>รวม</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h3 id="summary"></h3>

<div class="footer">
<div class="box">ผู้อนุมัติ</div>
<div class="box">ผู้รับเงิน</div>
<div class="box">ผู้รับสินค้า</div>
<div class="box">วันที่รับ</div>
</div>

<button onclick="openPayment()">บันทึก</button>
<button onclick="window.print()">PDF</button>

</div>

<!-- PAYMENT POPUP -->
<div id="paymentModal" class="modal">
<div class="modal-box">

<h3>เลือกการชำระเงิน</h3>

<button onclick="chooseCash()">เงินสด</button>
<button onclick="chooseCredit()">CREDIT</button>

<br><br>

<div id="creditBox" style="display:none">
<input type="date" id="dueDate">
<button onclick="confirmCredit()">ยืนยัน CREDIT</button>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container" style="display:none">
<canvas id="paymentChart"></canvas>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzP8MW4qH9lkdS56vj-6c_4jI6R0yWNYNolRWkH_NVvCTNHLnu9wlrpuvksN9MCeJng/exec";

let customers=JSON.parse(localStorage.getItem("customers")||"[]");
let bills=JSON.parse(localStorage.getItem("bills")||"[]");
let items=[];
let docPrefix="INV";

/* ID */
function generateID(){
let c=localStorage.getItem(docPrefix)||0;
c++;
localStorage.setItem(docPrefix,c);
invoiceNo.innerText=docPrefix+"-"+String(c).padStart(4,'0');
}
generateID();

/* DOC TYPE */
function changeDocType(v){
docPrefix=v;
generateID();
}

/* CUSTOMER */
function saveCustomer(){
customers.push({name:customer.value,address:address.value,tax:customerTax.value});
localStorage.setItem("customers",JSON.stringify(customers));
}

/* ITEMS */
function addItem(){
let total=(qty.value*price.value)-discount.value;
items.push({total});
render();
}

function render(){
let sum=items.reduce((s,i)=>s+i.total,0);
summary.innerText="รวม "+sum;
}

/* PAYMENT */
function openPayment(){
paymentModal.style.display="flex";
}

function chooseCash(){
saveBill("เงินสด","รับเงินแล้ว");
}

function chooseCredit(){
creditBox.style.display="block";
}

function confirmCredit(){
saveBill("CREDIT",dueDate.value);
}

/* SAVE */
function saveBill(method,extra){

let total=items.reduce((s,i)=>s+i.total,0);

let bill={
id:invoiceNo.innerText,
type:docPrefix,
customer:customer.value,
date:date.value,
total,
payment:method,
note:extra
};

bills.push(bill);
localStorage.setItem("bills",JSON.stringify(bills));

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(bill)
});

alert("บันทึกแล้ว");
paymentModal.style.display="none";

}

/* DASHBOARD */
let cash=0,credit=0;
bills.forEach(b=>{
if(b.payment==="เงินสด") cash+=b.total;
if(b.payment==="CREDIT") credit+=b.total;
});

new Chart(paymentChart,{
type:"pie",
data:{
labels:["เงินสด","CREDIT"],
datasets:[{data:[cash,credit]}]
}
});

function showPage(p){
billPage.style.display=p==="bill"?"block":"none";
dashboardPage.style.display=p==="dashboard"?"block":"none";
}

</script>

</body>
</html>
