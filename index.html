<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { font-family:'Sarabun'; background:#f5f5f5; }
.container { max-width:900px; margin:auto; background:white; padding:20px; }
</style>

</head>

<body>

<div class="container">

<h2>ระบบออกบิล</h2>

<input id="customer" placeholder="ลูกค้า">
<input id="date" type="date">

<input id="name" placeholder="สินค้า">
<input id="price" placeholder="ราคา">
<input id="qty" placeholder="จำนวน">

<button onclick="addItem()">เพิ่ม</button>

<table id="table"></table>

<h3 id="total"></h3>

<button onclick="saveBill()">💾 บันทึกบิล</button>

<hr>

<h2>📊 Dashboard</h2>
<p id="summary"></p>

<h2>📄 ประวัติ</h2>
<div id="history"></div>

</div>

<script>

// 🔥 ใส่ config คุณตรงนี้
const firebaseConfig = {
  apiKey: "ใส่ของคุณ",
  authDomain: "ใส่ของคุณ",
  projectId: "ใส่ของคุณ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];

function addItem(){
  let name = document.getElementById("name").value;
  let price = +document.getElementById("price").value;
  let qty = +document.getElementById("qty").value;

  items.push({name,price,qty});
  render();
}

function render(){
  let html="", total=0;

  items.forEach(i=>{
    let t=i.price*i.qty;
    total+=t;
    html+=`<tr><td>${i.name}</td><td>${t}</td></tr>`;
  });

  document.getElementById("table").innerHTML=html;
  document.getElementById("total").innerText="รวม: "+total;
}

async function saveBill(){
  let total = items.reduce((s,i)=>s+i.price*i.qty,0);

  await db.collection("bills").add({
    customer: document.getElementById("customer").value,
    date: document.getElementById("date").value,
    total,
    items
  });

  alert("บันทึกแล้ว");
  loadData();
}

async function loadData(){
  let snap = await db.collection("bills").get();

  let total=0;
  let html="";

  snap.forEach(doc=>{
    let d=doc.data();
    total+=d.total;

    html+=`<div>
      ${d.date} - ${d.customer} - ${d.total}
    </div>`;
  });

  document.getElementById("summary").innerText="ยอดรวมทั้งหมด: "+total;
  document.getElementById("history").innerHTML=html;
}

loadData();

</script>

</body>
</html>
